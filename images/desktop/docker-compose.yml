services:
  desktop:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      AUTH_ENABLED: "false"
      VNC_PASSWORD: "changeme"
      VNC_RESOLUTION: "1280x720"
      VNC_DEPTH: "24"
    shm_size: 256m

  desktop-auth:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      AUTH_ENABLED: "true"
      JWT_SECRET: "dev-secret-change-in-production"
      VNC_PASSWORD: "changeme"
      VNC_RESOLUTION: "1280x720"
      VNC_DEPTH: "24"
    shm_size: 256m
    profiles: ["auth"]
