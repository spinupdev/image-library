name: Build and Push Docker Images

on:
  push:
    tags:
      - '*/v*'

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse image name from tag
        id: image
        run: |
          TAG="${{ github.ref_name }}"
          IMAGE="${TAG%%/*}"
          echo "name=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Read platform targets
        id: platform
        run: |
          FILE="images/${{ steps.image.outputs.name }}/platform"
          if [ -f "$FILE" ]; then
            echo "targets=$(cat $FILE | tr -d '[:space:]')" >> $GITHUB_OUTPUT
          else
            echo "targets=linux/amd64" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ steps.image.outputs.name }}
          tags: |
            type=match,pattern=.+/(v.*),group=1
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/${{ steps.image.outputs.name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ steps.platform.outputs.targets }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
